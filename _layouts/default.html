<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — Spindrift Labs{% else %}Spindrift Labs{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="wordmark">
        <img src="{{ '/assets/img/spindrift-labs-logo.png' | relative_url }}" alt="Spindrift Labs" class="site-logo">
        SPINDRIFT LABS
      </a>
      <nav>
        <a href="mailto:support@spindriftlabs.net">Support</a>
        <a href="{{ '/security' | relative_url }}">Security</a>
        <a href="{{ '/privacy' | relative_url }}">Privacy</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        <a href="{{ '/privacy' | relative_url }}">Privacy Policy</a>
        <span class="sep">·</span>
        <a href="https://marketplace.atlassian.com/apps/3925154041/" target="_blank" rel="noopener">Terms</a>
        <span class="sep">·</span>
        <a href="{{ '/security' | relative_url }}">Security Statement</a>
      </p>
      <p class="copyright">&copy; Spindrift Labs</p>
    </div>
  </footer>

</body>
</html>
